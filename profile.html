<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIET | Student Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="profile">
  <header class="site-header">
    <nav class="navbar container" aria-label="Main navigation">
      <a class="brand" href="index.html"><img src="assets/images/sl.png" alt="SIET logo" /><div><strong>Sreyas Institute</strong><span>Engineering & Technology</span></div></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a data-page="home" href="index.html">Home</a></li><li><a data-page="about" href="about.html">About</a></li><li><a data-page="dashboard" href="dashboard.html">Dashboard</a></li><li><a data-page="courses" href="courses.html">Courses</a></li><li><a data-page="placements" href="placements.html">Placements</a></li><li><a data-page="ranking" href="ranking.html">Ranking</a></li><li><a data-page="syllabus" href="syllabus.html">Syllabus</a></li>
        <li class="auth-login"><a data-page="auth" href="auth.html">Login / Sign Up</a></li><li class="auth-profile" style="display:none;"><a data-page="profile" href="profile.html">Profile</a></li><li class="auth-logout" style="display:none;"><button id="logoutBtn" class="linklike">Logout</button></li>
      </ul>
    </nav>
  </header>

  <main class="container section">
    <h1>Student Profile</h1>
    <p class="profile-badge">Roll No: <span id="profileRoll"></span> | Email: <span id="profileEmail"></span></p>

    <section class="card">
      <form id="profileForm" class="form-grid">
        <div class="grid two-col">
          <div><label for="fullName">Full Name</label><input id="fullName" type="text" /></div>
          <div><label for="branch">Branch</label><input id="branch" type="text" placeholder="CSE / ECE / ME / etc" /></div>
          <div><label for="yearOfStudy">Year of Study</label><input id="yearOfStudy" type="text" placeholder="I / II / III / IV" /></div>
          <div><label for="phone">Phone</label><input id="phone" type="tel" /></div>
        </div>

        <div><label for="about">About</label><textarea id="about" placeholder="Short profile summary"></textarea></div>
        <div><label for="skills">Skills</label><textarea id="skills" placeholder="Java, Python, Web Development, etc"></textarea></div>

        <button class="btn btn-primary" type="submit">Save Profile</button>
      </form>
      <p id="profileMessage" class="message"></p>
    </section>
  </main>

  <footer class="page-footer"><div class="container footer-inner"><div class="footer-brand"><img src="assets/images/sl.png" alt="SIET logo" /><span>SIET Hyderabad</span></div><span id="userBadge">Guest Mode</span><span>© <span id="year"></span> SIET</span><span>Website by G Medha Rao</span></div></footer>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
